<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultPilot | AI Financial Autopilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-gradient-overlay"></div>

    <div class="container mt-5 position-relative z-1">
        <header class="mb-5 d-flex justify-content-between align-items-center">
            <div>
                <h1 class="display-4 fw-bolder text-primary tracking-tight mb-0">VaultPilot.</h1>
                <p class="lead text-muted mt-1 fw-light">AI-Powered Financial Autopilot</p>
            </div>
            <button class="btn border-0 shadow-none p-2" id="dark-mode-toggle" title="Toggle Dark Mode" style="font-size: 1.5rem; background: transparent;">
                🌙
            </button>
        </header>

        <div class="row g-4">
            <div class="col-md-7">
                
                <div class="card glass-card mb-4 position-relative overflow-hidden">
                    
                    <div id="wallet-overlay" class="position-absolute top-0 start-0 w-100 h-100 d-flex flex-column justify-content-center align-items-center z-2 glass-overlay">
                        <button class="btn btn-primary btn-modern px-5 py-3 fs-5 shadow-lg" id="connect-wallet-btn">
                            Connect Wallet
                        </button>
                    </div>

                    <div class="card-body p-5 blurred-state" id="app-content">
                        <h6 class="text-uppercase text-muted fw-bold tracking-wide mb-3">Total Balance</h6>
                        <h2 class="display-4 fw-bolder mb-1" id="total-balance">₹10,000.00</h2>
                        <p class="text-success fw-bold mb-4" id="growth-rate">+0.00% simulated APY</p>
                        <div class="d-flex gap-3 mt-2">
                            <button class="btn btn-primary btn-modern px-4 py-2" id="deposit-btn" disabled>Deposit ₹1,000</button>
                            <button class="btn btn-outline-danger btn-modern px-4 py-2" id="risk-btn" disabled>Simulate Risk ⚠️</button>
                        </div>
                    </div>
                </div>

                <div class="card glass-card mb-4">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3 d-flex align-items-center gap-2">
                            <span class="pulse-dot"></span> AI Activity Engine
                        </h6>
                        <div id="ai-logs" class="p-4 rounded-3" style="height: 200px; overflow-y: auto;">
                            <p class="mb-2">> Awaiting wallet connection...</p>
                        </div>
                    </div>
                </div>

                <div class="card glass-card">
                    <div class="card-body p-4">
                        <h6 class="text-uppercase text-muted fw-bold tracking-wide mb-3">Recent Transactions</h6>
                        <div class="table-responsive">
                            <table class="table table-borderless text-nowrap mb-0 modern-table">
                                <thead>
                                    <tr class="text-muted small border-bottom border-secondary border-opacity-25">
                                        <th>Type</th>
                                        <th>Action</th>
                                        <th class="text-end">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="tx-body">
                                    <tr>
                                        <td colspan="3" class="text-center text-muted py-3 small">No recent transactions</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-md-5">
                <div class="card glass-card h-100">
                    <div class="card-body p-5 d-flex flex-column align-items-center justify-content-center">
                        <h6 class="text-uppercase text-muted fw-bold tracking-wide mb-4 w-100 text-start">Live Allocation</h6>
                        <div class="chart-container w-100 position-relative" style="filter: blur(5px); opacity: 0.5; transition: 0.5s ease;" id="chart-overlay">
                            <canvas id="portfolioChart" style="max-height: 280px;"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
